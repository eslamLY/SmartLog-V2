{% extends "base.html" %}
{% set nav_active = 'document_vault' %}
{% block title %}خزينة المستندات{% endblock %}
{% block content %}
<header style="background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;flex-wrap:wrap;gap:10px;backdrop-filter:blur(12px)">
  <h1 style="font-size:16px;font-weight:700"><i class="ti ti-vault" style="color:var(--accent)"></i> خزينة المستندات</h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <select id="vaultFilter" onchange="filterVault(this.value)" style="width:auto;min-width:160px;font-size:13px">
      <option value="all">جميع الحالات</option>
      <option value="expired">منتهية ⛔</option>
      <option value="no_expiry">بدون انتهاء 📄</option>
      <option value="expiring_soon">تنتهي قريباً 🟠</option>
      <option value="active">سارية ✅</option>
    </select>
    <a href="/admin/documents" class="btn btn-ghost btn-sm"><i class="ti ti-settings"></i> إدارة</a>
  </div>
</header>
<div style="padding:20px;overflow-y:auto;max-height:calc(100vh - 65px)">
  <!-- Search Panel -->
  <div class="card" style="padding:14px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <i class="ti ti-search" style="color:var(--accent);font-size:16px"></i>
      <span style="font-weight:600;font-size:14px">البحث في المستندات</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input type="text" id="vaultSearchRef" placeholder="الرمز الإشاري..." oninput="fetchVaultDocs()" style="width:160px;font-size:13px">
      <input type="text" id="vaultSearchTitle" placeholder="عنوان المستند..." oninput="fetchVaultDocs()" style="flex:1;min-width:160px;font-size:13px">
      <select id="vaultSearchDept" onchange="fetchVaultDocs()" style="width:auto;min-width:140px;font-size:13px">
        <option value="">كل الأقسام</option>
{% for d in departments %}
        <option value="{{ d }}">{{ d }}</option>
{% endfor %}
      </select>
      <select id="vaultSearchEmp" onchange="fetchVaultDocs()" style="width:auto;min-width:160px;font-size:13px">
        <option value="">كل الموظفين</option>
{% for e in employees %}
        <option value="{{ e.id }}">{{ e.full_name }}</option>
{% endfor %}
      </select>
    </div>
  </div>

  <!-- Summary strip -->
  <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:140px;border-right:3px solid #ef4444">
      <i class="ti ti-circle-off" style="font-size:22px;color:#ef4444"></i>
      <div><div style="font-size:18px;font-weight:800;color:#ef4444" id="countExpired">0</div><div style="font-size:11px;color:var(--muted)">منتهية</div></div>
    </div>
    <div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:140px;border-right:3px solid var(--muted2)">
      <i class="ti ti-file-off" style="font-size:22px;color:var(--muted2)"></i>
      <div><div style="font-size:18px;font-weight:800;color:var(--muted2)" id="countNoExpiry">0</div><div style="font-size:11px;color:var(--muted)">بدون انتهاء</div></div>
    </div>
    <div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:140px;border-right:3px solid #f59e0b">
      <i class="ti ti-alert-triangle" style="font-size:22px;color:#f59e0b"></i>
      <div><div style="font-size:18px;font-weight:800;color:#f59e0b" id="countExpiring">0</div><div style="font-size:11px;color:var(--muted)">تنتهي قريباً</div></div>
    </div>
    <div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:140px;border-right:3px solid #22c55e">
      <i class="ti ti-circle-check" style="font-size:22px;color:#22c55e"></i>
      <div><div style="font-size:18px;font-weight:800;color:#22c55e" id="countActive">0</div><div style="font-size:11px;color:var(--muted)">سارية</div></div>
    </div>
  </div>

  <div id="vaultContainer"></div>
</div>
<style>
.vault-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; transition:all .2s; }
.vault-card:hover { border-color:rgba(255,255,255,.1); }
.vault-card.expired { border-right:3px solid #ef4444; background:rgba(239,68,68,.03); }
.vault-card.no_expiry { border-right:3px solid var(--muted2); }
.vault-card.expiring_soon { border-right:3px solid #f59e0b; background:rgba(245,158,11,.03); }
.vault-card.active { border-right:3px solid #22c55e; }
</style>
{% endblock %}
{% block scripts %}
<script>
let allDocs = [];

async function fetchVaultDocs(){
  const ref = document.getElementById('vaultSearchRef').value;
  const title = document.getElementById('vaultSearchTitle').value;
  const dept = document.getElementById('vaultSearchDept').value;
  const emp = document.getElementById('vaultSearchEmp').value;
  let params = new URLSearchParams();
  if(ref) params.set('reference_code', ref);
  if(title) params.set('title', title);
  if(dept) params.set('department', dept);
  if(emp) params.set('employee_id', emp);
  const r = await fetch('/api/documents/search?' + params.toString());
  const data = await r.json();
  if(data.ok) allDocs = data.documents;
  else allDocs = [];
  renderVault();
}

function renderVault(){
  const expired = allDocs.filter(d => d.expiry_status === 'expired');
  const noExpiry = allDocs.filter(d => !d.has_expiry_date);
  const expiring = allDocs.filter(d => d.expiry_status === 'expiring_soon');
  const active = allDocs.filter(d => d.has_expiry_date && d.expiry_status === 'active');

  document.getElementById('countExpired').textContent = expired.length;
  document.getElementById('countNoExpiry').textContent = noExpiry.length;
  document.getElementById('countExpiring').textContent = expiring.length;
  document.getElementById('countActive').textContent = active.length;

  const container = document.getElementById('vaultContainer');
  const activeFilter = document.getElementById('vaultFilter').value;
  let html = '';
  if(activeFilter === 'all' || activeFilter === 'expired') html += buildGroup(expired, 'expired', 'منتهية الصلاحية ⛔', '#ef4444', 'ti-alert-circle');
  if(activeFilter === 'all' || activeFilter === 'no_expiry') html += buildGroup(noExpiry, 'no_expiry', 'بدون تاريخ انتهاء 📄', 'var(--muted2)', 'file-off');
  if(activeFilter === 'all' || activeFilter === 'expiring_soon') html += buildGroup(expiring, 'expiring_soon', 'تنتهي قريباً 🟠', '#f59e0b', 'ti-alert-triangle');
  if(activeFilter === 'all' || activeFilter === 'active') html += buildGroup(active, 'active', 'سارية ✅', '#22c55e', 'ti-circle-check');
  if(!html) html = '<div style="text-align:center;padding:64px 16px"><div style="font-size:48px;margin-bottom:12px"><i class="ti ti-vault-off" style="font-size:48px;color:var(--muted)"></i></div><div style="font-size:15px;color:var(--muted)">لا توجد مستندات</div><a href="/admin/documents" class="btn btn-red btn-sm" style="margin-top:12px"><i class="ti ti-upload"></i> رفع مستند</a></div>';
  container.innerHTML = html;
}

function buildGroup(docs, groupClass, label, color, icon){
  if(!docs.length) return '';
  const cards = docs.map(d => {
    const expiryLabel = d.expiry_date
      ? (d.expiry_status === 'expired'
        ? '<span style="color:#ef4444"><i class="ti ti-calendar-off"></i> ' + d.expiry_date + '</span>'
        : d.expiry_status === 'expiring_soon'
        ? '<span style="color:#f59e0b;font-weight:600"><i class="ti ti-alert-triangle"></i> ' + d.expiry_date + ' 🟠</span>'
        : '<span style="color:var(--muted)"><i class="ti ti-calendar"></i> ' + d.expiry_date + '</span>')
      : '';
    return '<div class="vault-card ' + groupClass + '">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-weight:700;font-size:13px">' + esc(d.title) + '</div>' +
          '<div style="font-size:11px;color:var(--accent);font-family:monospace;direction:ltr;text-align:left;margin-top:2px">' + esc(d.reference_code) + ' <span style="color:var(--muted2)">v' + d.version + '</span></div>' +
        '</div>' +
        (d.employee_name ? '<span class="badge badge-info" style="white-space:nowrap">' + esc(d.employee_name) + '</span>' : '') +
      '</div>' +
      '<div style="margin-top:8px;display:flex;gap:12px;font-size:12px;color:var(--muted);flex-wrap:wrap">' +
        (d.department ? '<span><i class="ti ti-building"></i> ' + esc(d.department) + '</span>' : '') +
        expiryLabel +
      '</div>' +
      '<div style="margin-top:8px;display:flex;gap:6px">' +
        '<a href="/api/documents/download-pdf/' + d.id + '" class="btn btn-ghost btn-xs" target="_blank" title="تحميل PDF موثق"><i class="ti ti-file-type-pdf" style="color:#ef4444"></i></a>' +
      '</div>' +
    '</div>';
  }).join('');
  return '<div class="vault-group" data-group="' + groupClass + '" style="margin-bottom:16px">' +
    '<div style="font-size:14px;font-weight:700;margin-bottom:10px;color:' + color + '"><i class="ti ' + icon + '"></i> ' + label + ' <span style="font-weight:400;font-size:12px;color:var(--muted)">(' + docs.length + ')</span></div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px">' + cards + '</div></div>';
}

function filterVault(val){
  document.querySelectorAll('.vault-group').forEach(function(g){
    if(val === 'all'){ g.style.display = 'block'; return; }
    g.style.display = g.getAttribute('data-group') === val ? 'block' : 'none';
  });
}

function esc(s){ if(!s) return ''; var d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

fetchVaultDocs();
</script>
{% endblock %}
