<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SMARTLOG">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.svg') }}">
  <title>SMARTLOG — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page">
  <div class="login-background" style="background-image: url('{{ url_for('static', filename='images/tobruk-map.png') }}')"></div>
  <div class="login-overlay"></div>

  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-logo"><i class="ti ti-heartbeat"></i></div>
      <div class="login-header">
        <h1>SMARTLOG</h1>
        <div class="subtitle">نظام الحضور والموارد البشرية الذكي</div>
      </div>

      <div class="offline-banner" id="offlineBanner">
        <i class="ti ti-wifi-off"></i> أنت في وضع بدون إنترنت
      </div>
      <div class="timeout-msg" id="timeoutMsg"{% if timeout %} style="display:block"{% endif %}>
        <i class="ti ti-clock-hour-4"></i> انتهت جلستك. الرجاء تسجيل الدخول مرة أخرى.
      </div>

      <div id="loginForm">
        <div class="error-msg" id="errorMsg"></div>
        <div class="field">
          <label>الرقم الوظيفي</label>
          <div class="input-wrapper">
            <i class="ti ti-user input-icon"></i>
            <input type="text" id="username" placeholder="مثال: EMP001" autocomplete="username" dir="ltr" style="text-align:right">
          </div>
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <div class="input-wrapper">
            <i class="ti ti-lock input-icon"></i>
            <input type="password" id="password" placeholder="······" autocomplete="current-password">
          </div>
        </div>
        <div class="form-options">
          <div class="checkbox-wrapper">
            <input type="checkbox" id="remember">
            <label for="remember">تذكرني</label>
          </div>
          <a href="#" class="forgot-link">هل نسيت كلمة المرور؟</a>
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">
          <span class="btn-text">تسجيل الدخول</span>
          <div class="spinner"></div>
        </button>
      </div>

      <div class="offline-mode-card" id="offlineModeCard">
        <div class="emp-avatar" id="offlineAvatar">أ</div>
        <div class="emp-name" id="offlineEmpName">أحمد محمد</div>
        <div class="emp-dept" id="offlineEmpDept">قسم المختبر</div>
        <div class="last-sync" id="offlineLastSync">آخر مزامنة: منذ 5 دقائق</div>
        <button class="btn btn-green" onclick="goOffline()">
          <i class="ti ti-arrow-left"></i> الدخول إلى لوحة الحضور
        </button>
        <div style="margin-top:10px">
          <button class="btn btn-orange" onclick="showLoginForm()" style="font-size:12px;padding:8px">
            <i class="ti ti-refresh"></i> تسجيل الدخول بحساب آخر
          </button>
        </div>
      </div>

      <div class="login-footer">
        <p><i class="ti ti-heart" style="color:#e53935"></i> SMARTLOG — جميع الحقوق محفوظة © 2026</p>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/encryption-utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/indexeddb-manager.js') }}"></script>
  <script>
  var isOfflineMode = false;

  function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/js/service-worker.js', { scope: '/' })
        .then(function (reg) { console.log('SW registered:', reg.scope); })
        .catch(function (err) { console.warn('SW registration failed:', err); });
    }
  }

  function checkConnectivity() {
    var banner = document.getElementById('offlineBanner');
    if (!navigator.onLine) {
      banner.style.display = 'block';
      tryOfflineLogin();
    } else {
      fetch('/api/health', { method: 'GET', cache: 'no-store', signal: AbortSignal.timeout(5000) })
        .then(function (r) {
          if (r.ok) { banner.style.display = 'none'; }
          else { banner.style.display = 'block'; tryOfflineLogin(); }
        })
        .catch(function () { banner.style.display = 'block'; tryOfflineLogin(); });
    }
  }

  function tryOfflineLogin() {
    var sessionData = getStoredSession();
    if (sessionData) {
      var now = Date.now();
      var loginTime = sessionData.login_time || 0;
      var maxAge = 30 * 24 * 60 * 60 * 1000;
      if (now - loginTime < maxAge) { showOfflineMode(sessionData); }
      else { clearStoredSession(); }
    }
    if (!navigator.onLine) {
      document.getElementById('offlineModeCard').style.display = 'block';
      document.getElementById('offlineAvatar').textContent = '?';
      document.getElementById('offlineEmpName').textContent = 'لا توجد جلسة سابقة';
      document.getElementById('offlineEmpDept').textContent = '';
      document.getElementById('offlineLastSync').textContent = 'يرجى الاتصال بالإنترنت لأول مرة';
      document.querySelector('#offlineModeCard .btn-green').style.display = 'none';
    }
  }

  function showOfflineMode(sessionData) {
    document.getElementById('offlineModeCard').style.display = 'block';
    document.getElementById('offlineAvatar').textContent = (sessionData.employee_name || '?')[0];
    document.getElementById('offlineEmpName').textContent = sessionData.employee_name || 'موظف';
    document.getElementById('offlineEmpDept').textContent = sessionData.department || '';
    var lastSync = sessionData.last_synced || sessionData.login_time;
    var diff = Date.now() - lastSync;
    var diffMinutes = Math.floor(diff / 60000);
    var diffHours = Math.floor(diff / 3600000);
    var syncText = '';
    if (diffMinutes < 1) { syncText = 'منذ لحظات'; }
    else if (diffMinutes < 60) { syncText = 'منذ ' + diffMinutes + ' دقائق'; }
    else if (diffHours < 24) { syncText = 'منذ ' + diffHours + ' ساعات'; }
    else { syncText = 'منذ أكثر من يوم'; }
    document.getElementById('offlineLastSync').textContent = 'آخر مزامنة: ' + syncText;
    document.querySelector('#offlineModeCard .btn-green').style.display = 'block';
    isOfflineMode = true;
  }

  function goOffline() {
    var sessionData = getStoredSession();
    if (sessionData && sessionData.redirect_url) { window.location.href = sessionData.redirect_url; }
    else { window.location.href = '/employee'; }
  }

  function showLoginForm() {
    document.getElementById('offlineModeCard').style.display = 'none';
    isOfflineMode = false;
  }

  function getStoredSession() {
    try {
      var raw = localStorage.getItem('attendance_session');
      if (!raw) return null;
      try {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.encrypted) {
          var decrypted = EncryptionUtils.decryptData(raw);
          if (decrypted) return JSON.parse(decrypted);
          return null;
        }
      } catch (e) {}
      if (raw.iv || raw.ciphertext) { return null; }
      var parsed2 = JSON.parse(raw);
      if (parsed2 && parsed2.employee_id) return parsed2;
      return null;
    } catch (e) { return null; }
  }

  function saveSession(data) {
    try {
      var sessionData = {
        employee_id: data.employee_id,
        employee_name: data.employee_name,
        department: data.department,
        token: data.token || '',
        login_time: Date.now(),
        last_synced: Date.now(),
        redirect_url: data.redirect || '/employee',
      };
      var json = JSON.stringify(sessionData);
      EncryptionUtils.encrypt(json).then(function (encrypted) {
        var wrapped = JSON.stringify({ encrypted: encrypted, created_at: Date.now() });
        localStorage.setItem('attendance_session', wrapped);
      }).catch(function () {
        localStorage.setItem('attendance_session', json);
      });
    } catch (e) {}
  }

  function clearStoredSession() {
    try { localStorage.removeItem('attendance_session'); } catch (e) {}
  }

  function loadRememberedUsername() {
    try {
      var saved = localStorage.getItem('smartlog_username');
      if (saved) {
        document.getElementById('username').value = saved;
        document.getElementById('remember').checked = true;
      }
    } catch (e) {}
  }

  function saveRememberedUsername() {
    try {
      if (document.getElementById('remember').checked) {
        localStorage.setItem('smartlog_username', document.getElementById('username').value.trim());
      } else {
        localStorage.removeItem('smartlog_username');
      }
    } catch (e) {}
  }

  async function doLogin() {
    var btn = document.getElementById('loginBtn');
    var err = document.getElementById('errorMsg');
    btn.classList.add('loading');
    btn.disabled = true;
    err.style.display = 'none';
    try {
      var deviceId = localStorage.getItem('device_id') || '';
      if (!deviceId) {
        deviceId = 'web-' + Math.random().toString(36).substring(2, 10);
        localStorage.setItem('device_id', deviceId);
      }
      var csrfMeta = document.querySelector('meta[name="csrf-token"]');
      var csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';
      var r = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
          device_id: deviceId,
        })
      });
      var d = await r.json();
      if (d.ok) {
        saveRememberedUsername();
        var sessionData = {
          employee_id: d.employee_id || '',
          employee_name: d.employee_name || '',
          department: d.department || '',
          token: d.token || '',
          login_time: Date.now(),
          last_synced: Date.now(),
          redirect: d.redirect,
        };
        saveSession(sessionData);
        await IndexedDBManager.cacheEmployeeData({
          employee_id: d.employee_id,
          full_name: d.employee_name,
          department: d.department,
          cached_at: Date.now(),
        });
        IndexedDBManager.addLogEntry('info', 'تسجيل دخول ناجح', { employee_id: d.employee_id }).catch(function () {});
        window.location.href = d.redirect;
      } else {
        err.textContent = d.msg;
        err.style.display = 'block';
        btn.classList.remove('loading');
        btn.disabled = false;
        if (d.multi_device) {
          var confirmed = confirm(d.msg + '\n\nهل تريد المتابعة؟');
          if (confirmed) {
            btn.classList.add('loading');
            btn.disabled = true;
            var r2 = await fetch('/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
              body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                device_id: deviceId,
                force_login: true,
              })
            });
            var d2 = await r2.json();
            if (d2.ok) {
              saveRememberedUsername();
              saveSession(d2);
              window.location.href = d2.redirect;
            } else {
              err.textContent = d2.msg;
              err.style.display = 'block';
              btn.classList.remove('loading');
              btn.disabled = false;
            }
          } else {
            btn.classList.remove('loading');
            btn.disabled = false;
          }
        }
      }
    } catch (e) {
      err.textContent = 'حدث خطأ في الاتصال بالخادم. حاول مرة أخرى.';
      err.style.display = 'block';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
  window.addEventListener('online', function () {
    document.getElementById('offlineBanner').style.display = 'none';
    if (isOfflineMode) { window.location.reload(); }
  });
  window.addEventListener('offline', function () {
    document.getElementById('offlineBanner').style.display = 'block';
    tryOfflineLogin();
  });

  loadRememberedUsername();
  registerServiceWorker();
  checkConnectivity();
  </script>
</body>
</html>
