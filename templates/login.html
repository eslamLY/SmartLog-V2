<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SMARTLOG">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.svg') }}">
  <title>SMARTLOG — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page">
  <div class="login-background" style="background-image: url('{{ url_for('static', filename='images/tobruk-map.png') }}')"></div>
  <div class="login-overlay"></div>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo"><i class="ti ti-heartbeat"></i></div>
      <div class="login-header">
        <h1>SMARTLOG</h1>
        <div class="subtitle">نظام الحضور والموارد البشرية الذكي</div>
      </div>

      <div class="offline-banner" id="offlineBanner" style="display:none">
        <i class="ti ti-wifi-off"></i> أنت في وضع بدون إنترنت
      </div>
      <div class="timeout-msg" id="timeoutMsg"{% if timeout %} style="display:block"{% endif %}>
        <i class="ti ti-clock-hour-4"></i> انتهت جلستك. الرجاء تسجيل الدخول مرة أخرى.
      </div>

      <div id="loginForm">
        <div class="error-msg" id="errorMsg"></div>
        <div class="field">
          <label>الرقم الوظيفي</label>
          <div class="input-wrapper">
            <i class="ti ti-user input-icon"></i>
            <input type="text" id="username" placeholder="مثال: EMP001" autocomplete="username" dir="ltr" style="text-align:right">
          </div>
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <div class="input-wrapper">
            <i class="ti ti-lock input-icon"></i>
            <input type="password" id="password" placeholder="······" autocomplete="current-password">
          </div>
        </div>
        <div class="form-options">
          <div class="checkbox-wrapper">
            <input type="checkbox" id="remember">
            <label for="remember">تذكرني</label>
          </div>
          <a href="#" class="forgot-link">هل نسيت كلمة المرور؟</a>
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">
          <span class="btn-text">تسجيل الدخول</span>
          <div class="spinner"></div>
        </button>
      </div>

      <div class="login-footer">
        <p><i class="ti ti-heart" style="color:#e53935"></i> SMARTLOG — جميع الحقوق محفوظة © 2026</p>
      </div>
    </div>
  </div>

  <script>
  function getCSRF() { var m = document.querySelector('meta[name="csrf-token"]'); return m ? m.getAttribute('content') : ''; }

  function loadUsername() {
    try {
      var saved = localStorage.getItem('smartlog_username');
      if (saved) { document.getElementById('username').value = saved; document.getElementById('remember').checked = true; }
    } catch (e) {}
  }

  function saveUsername() {
    try {
      if (document.getElementById('remember').checked) { localStorage.setItem('smartlog_username', document.getElementById('username').value.trim()); }
      else { localStorage.removeItem('smartlog_username'); }
    } catch (e) {}
  }

  async function doLogin() {
    var btn = document.getElementById('loginBtn');
    var err = document.getElementById('errorMsg');
    btn.classList.add('loading');
    btn.disabled = true;
    err.style.display = 'none';
    try {
      var r = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        })
      });
      var d = await r.json();
      if (d.ok) {
        saveUsername();
        window.location.href = d.redirect;
      } else {
        err.textContent = d.msg;
        err.style.display = 'block';
        btn.classList.remove('loading');
        btn.disabled = false;
        if (d.multi_device) {
          var confirmed = confirm(d.msg + '\n\nهل تريد المتابعة؟');
          if (confirmed) {
            btn.classList.add('loading');
            btn.disabled = true;
            var r2 = await fetch('/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
              body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                force_login: true,
              })
            });
            var d2 = await r2.json();
            if (d2.ok) { saveUsername(); window.location.href = d2.redirect; }
            else { err.textContent = d2.msg; err.style.display = 'block'; btn.classList.remove('loading'); btn.disabled = false; }
          } else { btn.classList.remove('loading'); btn.disabled = false; }
        }
      }
    } catch (e) {
      err.textContent = 'حدث خطأ في الاتصال بالخادم. حاول مرة أخرى.';
      err.style.display = 'block';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function checkOnline() {
    if (!navigator.onLine) { document.getElementById('offlineBanner').style.display = 'block'; }
  }

  document.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
  window.addEventListener('online', function () { document.getElementById('offlineBanner').style.display = 'none'; });
  window.addEventListener('offline', function () { document.getElementById('offlineBanner').style.display = 'block'; });
  loadUsername();
  checkOnline();
  </script>
</body>
</html>
