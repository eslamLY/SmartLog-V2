<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — بنك دم طبرق</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <style>
    :root { --bg: #080c18; --card: #10152a; --border: #1e2642; --text: #e2e8f0; --muted: #94a3b8; --accent: #6366f1; --red: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; background-image: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,.08) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(239,68,68,.05) 0%, transparent 60%); }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
    .logo { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg,var(--accent),#4f46e5); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    h1 { text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
    input { width: 100%; padding: 12px 14px; background: #0a0f22; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; transition: border .2s, box-shadow .2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.2); }
    .btn { width: 100%; padding: 12px; background: linear-gradient(135deg,var(--accent),#4f46e5); color: #fff; border: none; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .15s; }
    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .error { background: rgba(239,68,68,.12); color: #ef4444; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; text-align: center; }
    .fingerprint { text-align: center; margin-top: 24px; font-size: 11px; color: var(--muted); opacity: .6; }
    .timeout-msg { background: rgba(245,158,11,.12); color: #f59e0b; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; text-align: center; }
    @media (max-width: 420px) { .login-card { padding: 28px 20px; } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="ti ti-heartbeat" style="font-size:28px;color:#fff"></i></div>
    <h1>منظومة بنك دم طبرق</h1>
    <div class="subtitle">نظام الحضور والانصراف</div>
    {% if timeout %}
    <div class="timeout-msg"><i class="ti ti-clock-hour-4"></i> انتهت جلستك. الرجاء تسجيل الدخول مرة أخرى.</div>
    {% endif %}
    <div class="error" id="errorMsg"></div>
    <div class="field">
      <label>الرقم الوظيفي</label>
      <input type="text" id="username" placeholder="مثال: EMP001" autocomplete="username" dir="ltr" style="text-align:right">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="······" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
    <div class="fingerprint"><i class="ti ti-heart"></i> بنك دم طبرق — جميع الحقوق محفوظة</div>
  </div>
  <script>
  async function doLogin(){
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    btn.disabled = true; btn.textContent = 'جاري التحقق...'; err.style.display = 'none';
    try {
      const r = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const d = await r.json();
      if (d.ok) { window.location.href = d.redirect; }
      else { err.textContent = d.msg; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'تسجيل الدخول'; }
    } catch(e) {
      err.textContent = 'حدث خطأ في الاتصال بالخادم. حاول مرة أخرى.'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'تسجيل الدخول';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
