<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>محظور</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f13;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;direction:rtl}
.blocked-card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:20px;padding:48px;max-width:420px;width:90%;text-align:center}
.icon{margin-bottom:20px}
.icon svg{width:64px;height:64px;color:#ef4444}
h1{font-size:20px;font-weight:700;margin-bottom:12px}
p{color:#94a3b8;font-size:15px;line-height:1.6;margin-bottom:8px}
.btn{margin-top:24px;display:inline-block;padding:10px 28px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s}
.btn:hover{background:#dc2626}
</style>
</head>
<body>
<div class="blocked-card">
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </div>
  <h1>تم حظرك</h1>
  <p>بسبب عدد ارسال الاوامر تم حظرك.</p>
  <p style="font-size:13px;color:#64748b">الرجاء الانتظار ثم المحاولة مجدداً.</p>
  <button class="btn" onclick="history.back()">العودة</button>
</div>
</body>
</html>
