<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>تغيير كلمة المرور — بنك دم طبرق</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', Arial, sans-serif; background: #080c18; color: #f0f4f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #0f172a; border: 1px solid #1e2a45; border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; margin: 16px; }
    h1 { font-size: 18px; text-align: center; margin-bottom: 6px; }
    p { font-size: 13px; color: #8899b4; text-align: center; margin-bottom: 20px; }
    .input-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #8899b4; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; background: #141d33; border: 1px solid #1e2a45; border-radius: 10px; color: #f0f4f9; font-size: 14px; font-family: inherit; }
    input:focus { outline: none; border-color: #6366f1; }
    .btn { width: 100%; padding: 10px; background: #6366f1; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #818cf8; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error { color: #dc2626; font-size: 12px; margin-top: 4px; display: none; }
    .hint { font-size: 11px; color: #566580; margin-top: 4px; }
    .strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all .2s; }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:12px">
      <div style="width:48px;height:48px;border-radius:50%;background:#6366f120;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:2px solid #6366f1">
        <i class="ti ti-lock" style="font-size:22px;color:#818cf8"></i>
      </div>
      <h1>تغيير كلمة المرور</h1>
      <p>يجب تغيير كلمة المرور قبل متابعة استخدام النظام</p>
    </div>
    <form id="pwForm" onsubmit="return doChange(event)">
      <div class="input-group">
        <label>كلمة المرور الجديدة</label>
        <input type="password" id="pw" oninput="checkStrength(this.value)" autocomplete="new-password" required minlength="6">
        <div class="strength" id="strengthBar" style="width:0;background:var(--red)"></div>
        <div class="hint">يجب أن تحتوي على 6 أحرف على الأقل، حرف كبير، حرف صغير، رقم</div>
        <div class="error" id="pwError"></div>
      </div>
      <div class="input-group">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="pw2" autocomplete="new-password" required>
        <div class="error" id="matchError"></div>
      </div>
      <button type="submit" class="btn" id="submitBtn">تغيير كلمة المرور</button>
    </form>
  </div>
  <script>
    function checkStrength(pw) {
      var bar = document.getElementById('strengthBar');
      var score = 0;
      if (pw.length >= 6) score++;
      if (/[a-z]/.test(pw)) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^a-zA-Z0-9]/.test(pw)) score++;
      var pct = (score / 5) * 100;
      bar.style.width = pct + '%';
      bar.style.background = pct < 40 ? '#dc2626' : pct < 80 ? '#f59e0b' : '#22c55e';
    }
    function doChange(e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value;
      var pw2 = document.getElementById('pw2').value;
      var pwErr = document.getElementById('pwError');
      var matchErr = document.getElementById('matchError');
      pwErr.style.display = 'none';
      matchErr.style.display = 'none';
      if (pw.length < 6) { pwErr.textContent = 'كلمة المرور قصيرة جداً'; pwErr.style.display = 'block'; return false; }
      if (pw !== pw2) { matchErr.textContent = 'كلمتا المرور غير متطابقتين'; matchErr.style.display = 'block'; return false; }
      var btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'جاري الحفظ...';
      var csrf = document.querySelector('meta[name="csrf-token"]');
      fetch('/force-password-change', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf ? csrf.content : '' },
        body: JSON.stringify({ password: pw })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.ok) { window.location.href = data.redirect; }
        else {
          pwErr.textContent = data.msg || 'حدث خطأ';
          pwErr.style.display = 'block';
          btn.disabled = false; btn.textContent = 'تغيير كلمة المرور';
        }
      }).catch(function() {
        pwErr.textContent = 'فشل الاتصال بالخادم';
        pwErr.style.display = 'block';
        btn.disabled = false; btn.textContent = 'تغيير كلمة المرور';
      });
      return false;
    }
  </script>
</body>
</html>
