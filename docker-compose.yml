version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartlog
      POSTGRES_PASSWORD: smartlog_pass
      POSTGRES_DB: smartlog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://smartlog:smartlog_pass@db:5432/smartlog
      SECRET_KEY: local-dev-key-change-in-prod
      FIELD_ENCRYPTION_KEY: ""
      PRODUCTION: "false"
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "2"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
