# SmartLog V2 — Security Scan Workflow
# Runs on every PR and push to main.
name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Run Bandit (SAST)
        run: bandit -r . --exclude=.github,.venv,__pycache__,*.pyc --format custom --severity-level high --confidence-level high

      - name: Run pip-audit
        continue-on-error: true
        run: pip-audit --desc on --strict

      - name: Run Safety (dependency vuln scanner)
        continue-on-error: true
        run: safety check -r requirements.txt --full-report

      - name: Run Infrastructure Security Checker
        run: python infrastructure_security_checker.py

      - name: Run Requirements Security Audit
        run: python requirements_security_audit.py

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            infrastructure_security_report.html
            requirements_security_report.html
          retention-days: 30
