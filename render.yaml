# Render Blueprint — SmartLog V2 Infrastructure
# ===============================================
# This file defines the full infrastructure: database + web service.
# Render auto-creates both when you connect this GitHub repo.
#
# Static files: Flask serves /static/ directly via static_folder.
# No nginx/caddy reverse proxy needed on Render's free/starter tier.
#
# Icon troubleshooting on Render:
#   1. Verify static/ exists on disk (SSH or Render Shell)
#   2. Check /api/health/static for file status
#   3. Open browser DevTools > Network > reload
#   4. Look for 404s on /static/* or CDN URLs
#   5. Check Console tab for CSP errors (font-src, style-src)
#   6. Check Render logs: service > Logs > search "static"
#
# Before/After fix comparison:
#   Before: href="/static/css/style.css"           — HARDCODED, may 404
#   After:  href="{{ url_for('static', filename='css/style.css') }}" — CORRECT
#
#   Before: font-src 'self';                       — BLOCKS CDN fonts
#   After:  font-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; — WORKS

databases:
  - name: smartlog-db
    databaseName: smartlog
    plan: starter          # $7/mo — 1 GB RAM, 10 GB storage
    region: oregon         # Change to nearest your users
    postgresMajorVersion: 16
    ipAllowList: []

services:
  - type: web
    name: smartlog-backend
    runtime: docker
    region: oregon
    plan: starter          # $7/mo — 512 MB RAM, 1 CPU
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # ─── App Configuration ───
      - key: FLASK_ENV
        value: production
      - key: PRODUCTION
        value: "true"
      - key: FLASK_APP
        value: app.py
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "5000"

      # ─── Secrets (auto-generated on first deploy) ───
      - key: SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true

      # ─── Database (auto-linked from smartlog-db) ───
      - key: DATABASE_URL
        fromDatabase:
          name: smartlog-db
          property: connectionString

      # ─── Gunicorn Tuning ───
      - key: GUNICORN_WORKERS
        value: "2"
      - key: GUNICORN_THREADS
        value: "4"

      # ─── Connection Pooling ───
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_POOL_OVERFLOW
        value: "20"
      - key: DB_POOL_RECYCLE
        value: "3600"
